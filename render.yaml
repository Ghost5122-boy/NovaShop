services:
  - type: web
    name: nova-shop
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RENDER
        value: true
      - key: ADMIN_PASSWORD
        sync: false
        value: NovaShop1733
      - key: GITHUB_PAT
        sync: false

  - type: web
    name: nova-shop-admin
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node admin-server/start.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RENDER
        value: true
      - key: ADMIN_PASSWORD
        sync: false
        value: NovaShop1733
      - key: GITHUB_PAT
        sync: false
