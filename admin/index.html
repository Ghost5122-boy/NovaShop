<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nova Shop</title>
  <script>
    if (location.hostname.endsWith('github.io')) {
      location.replace('https://nova-shop-admin.onrender.com/admin/');
    }
  </script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="login-view" class="admin-login">
    <div class="login-card">
      <h1>Admin</h1>
      <p>Connexion requise</p>
      <form id="login-form">
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required placeholder="Entrez le mot de passe admin">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Connexion</button>
      </form>
      <p id="login-error" style="color:#ff4757;text-align:center;margin-top:1rem;display:none"></p>
    </div>
  </div>

  <div id="admin-view" class="hidden">
    <nav class="navbar">
      <a href="https://ghost5122-boy.github.io/NovaShop/" id="shop-home-link" class="logo">
        <span class="logo-icon">NS</span>
        Nova Shop Admin
      </a>
      <div style="display:flex;gap:0.75rem;align-items:center">
        <a href="https://ghost5122-boy.github.io/NovaShop/" class="btn btn-outline">Voir la boutique</a>
        <button class="btn btn-outline" id="logout-btn">Déconnexion</button>
      </div>
    </nav>

    <main class="admin-panel">
      <div class="admin-header">
        <h1>Panneau d'administration</h1>
        <button class="btn btn-primary" id="add-account-btn">+ Ajouter un compte</button>
      </div>

      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="accounts">Comptes</button>
        <button class="tab-btn" data-tab="settings">Paramètres PayPal</button>
      </div>

      <div id="tab-accounts">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Pseudo</th>
              <th>Prix</th>
              <th>Certifié</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="accounts-table"></tbody>
        </table>
      </div>

      <div id="tab-settings" class="hidden">
        <div class="login-card" style="max-width:500px;margin:0">
          <h2 style="margin-bottom:1.5rem">Configuration PayPal</h2>
          <form id="settings-form">
            <div class="form-group">
              <label for="paypal-email">Email PayPal (réception paiements)</label>
              <input type="email" id="paypal-email" placeholder="votre@paypal.com">
            </div>
            <div class="form-group">
              <label for="paypal-client-id">PayPal Client ID (optionnel, pour boutons intégrés)</label>
              <input type="text" id="paypal-client-id" placeholder="Client ID sandbox ou live">
            </div>
            <div class="form-group">
              <label for="site-name">Nom du site</label>
              <input type="text" id="site-name" value="Nova Shop">
            </div>
            <button type="submit" class="btn btn-primary">Sauvegarder</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="account-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Ajouter un compte</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="account-form">
        <input type="hidden" id="acc-id">
        <div class="form-group">
          <label for="acc-username">Pseudo Minecraft</label>
          <input type="text" id="acc-username" required>
        </div>
        <div class="form-group">
          <label for="acc-price">Prix (€)</label>
          <input type="number" id="acc-price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label for="acc-email">Email du compte</label>
          <input type="email" id="acc-email" required>
        </div>
        <div class="form-group">
          <label for="acc-password">Mot de passe du compte</label>
          <input type="text" id="acc-password" required>
        </div>
        <div class="form-group">
          <label for="acc-description">Description</label>
          <textarea id="acc-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="acc-certified" checked> Compte certifié
          </label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sauvegarder</button>
      </form>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
